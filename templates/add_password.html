<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Credential</title>
    {% assets "tailwind" %}
    <link rel="stylesheet" href="{{ ASSET_URL }}">
    {% endassets %}
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <nav class="mb-8 space-x-4 border-b border-gray-700 pb-4">
            <a href="/vault/add_page" class="text-blue-400 font-bold">Add</a>
            <a href="/vault/view_page" class="text-gray-400 hover:text-white">View</a>
            <a href="/vault/delete_page" class="text-gray-400 hover:text-white">Delete</a>
            <a href="/vault/audit_page" class="text-gray-400 hover:text-white">Audit</a>
            <a href="/vault/signout" class="text-red-400 hover:text-white">Sign Out</a>
        </nav>

        <h1 class="text-3xl font-bold mb-8">Add New Password</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-6 rounded-lg space-y-4">
                <input type="text" id="service" placeholder="Service (e.g. Gmail)" class="w-full bg-gray-700 p-3 rounded">
                <input type="text" id="username" placeholder="Username" class="w-full bg-gray-700 p-3 rounded">
                
                <div class="flex gap-2">
                    <input type="text" id="password" placeholder="Password" class="flex-grow bg-gray-700 p-3 rounded">
                    <button onclick="generatePassword()" type="button" class="bg-blue-600 hover:bg-blue-700 px-4 rounded font-semibold transition">
                        Generate
                    </button>
                </div>

                <button onclick="savePassword()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded font-bold">
                    Authorize & Save
                </button>
            </div>
        </div>
    </div>

    <script>
        // New function to talk to your /vault/generate_password backend endpoint
        async function generatePassword() {
            try {
                const response = await fetch('/vault/generate_password');
                const result = await response.json();
                document.getElementById('password').value = result.password;
            } catch (error) {
                console.error("Error generating password:", error);
                alert("Failed to generate password.");
            }
        }

        async function savePassword() {
            const payload = {
                service: document.getElementById('service').value,
                user: document.getElementById('username').value,
                pwd: document.getElementById('password').value
            };

            const response = await fetch('/vault/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            alert(result.status === "success" ? "Credential Secured!" : "Face Not Recognized");
        }
    </script>
</body>
</html>
