<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Audit</title>
    {% assets "tailwind" %}
    <link rel="stylesheet" href="{{ ASSET_URL }}">
    {% endassets %}
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <nav class="mb-8 space-x-4 border-b border-gray-700 pb-4">
            <a href="/vault/add_page" class="text-gray-400 hover:text-white">Add</a>
            <a href="/vault/view_page" class="text-blue-400 font-bold">View</a>
            <a href="/vault/delete_page" class="text-gray-400 hover:text-white">Delete</a>
            <a href="/vault/audit_page" class="text-gray-400 hover:text-white">Audit</a>
            <a href="/vault/signout" class="text-red-400 hover:text-white">Sign Out</a>
        </nav>

        <h1 class="text-3xl font-bold mb-4">Vault Security Audit</h1>
        <p class="text-gray-400 mb-8">Mathematically analyzing your credentials for vulnerabilities.</p>

        <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </div>

    <script>
        runAudit(); // Auto-run on page load
        async function runAudit() {
            const container = document.getElementById('results');
            container.innerHTML = ""; // Clear previous results if any
        
            const response = await fetch('/vault/audit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            });

            const result = await response.json();
            
            if (result.status === "success") {
                container.innerHTML = result.report.map(item => `
                    <div class="bg-gray-800 p-4 rounded-lg border-l-4 ${getBorder(item.strength)} animate-fade-in">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-lg">${item.service}</h3>
                            <span class="text-xs font-mono bg-gray-700 px-2 py-1 rounded">${item.bits} bits</span>
                        </div>
                        <p class="mt-2 text-sm ${getText(item.strength)}">${item.strength} Strength</p>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `
                    <div class="col-span-full text-center p-8 border-2 border-dashed border-red-900 rounded-xl">
                        <p class="text-red-500 font-bold">Access Denied: Identity Not Verified</p>
                        <p class="text-gray-500 text-sm">Previous session data has been purged for security.</p>
                    </div>
                `;
                alert("Identity verification failed. Results cleared.");
            }
        }

        function getBorder(s) {
            if (s === 'Excellent') return 'border-green-500';
            if (s === 'Good') return 'border-blue-500';
            if (s === 'Weak') return 'border-yellow-500';
            return 'border-red-500';
        }

        function getText(s) {
            if (s === 'Excellent') return 'text-green-400';
            if (s === 'Good') return 'text-blue-400';
            return 'text-yellow-500';
        }
    </script>
</body>
</html>
