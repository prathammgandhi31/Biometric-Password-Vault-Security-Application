<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Vault</title>
    {% assets "tailwind" %}
    <link rel="stylesheet" href="{{ ASSET_URL }}">
    {% endassets %}
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <nav class="mb-8 space-x-4 border-b border-gray-700 pb-4">
            <a href="/vault/add_page" class="text-gray-400 hover:text-white">Add</a>
            <a href="/vault/view_page" class="text-blue-400 font-bold">View</a>
            <a href="/vault/delete_page" class="text-gray-400 hover:text-white">Delete</a>
            <a href="/vault/audit_page" class="text-gray-400 hover:text-white">Audit</a>
            <a href="/vault/signout" class="text-red-400 hover:text-white">Sign Out</a>
        </nav>

        <h1 class="text-3xl font-bold mb-8">Delete Credentials</h1>

        <div class="bg-gray-800 p-4 rounded-lg mb-8 inline-block">
            <video id="webcam" autoplay playsinline class="w-48 h-36 rounded bg-black border border-red-500"></video>
            <canvas id="canvas" class="hidden"></canvas>
        </div>

        <div id="deleteContainer" class="bg-gray-800 rounded-lg p-6">
             <div id="listBody"></div>
        </div>
    </div>

    <script>
        fetchEntries(); // Load entries on page load
        async function fetchEntries() {

            const response = await fetch('/vault/view', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})
            });
            
            const result = await response.json();
            if (result.status === "success") {
                // row[0] is the database ID, row[1] is Service, row[2] is Username
                document.getElementById('listBody').innerHTML = result.data.map((row) => `
                    <div class="flex justify-between items-center p-3 border-b border-gray-700">
                        <span><strong>${row[1]}</strong>: ${row[2]}</span>
                        <button onclick="deleteEntry(${row[0]})" 
                                class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm transition">
                            <img class="max-h-16 max-w-16 object-center object-contain visible " src="{{url_for('static', filename='images/trash-can.png')}}">
                        </button>
                    </div>
                `).join('');
            } else {
                alert("Verification failed.");
            }
        }

        async function deleteEntry(dbId) {
            const response = await fetch('/vault/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    passwordId: dbId  // This is now the actual Primary Key from SQLite
                })
            });
            
            const result = await response.json();
            if (result.status === "success") { 
                alert("Credential successfully removed."); 
                fetchEntries(); // Refresh the list automatically
            } else {
                alert("Authorization failed. Action blocked.");
            }
        }
    </script>
</body>
</html>
