<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Vault</title>
    {% assets "tailwind" %}
    <link rel="stylesheet" href="{{ ASSET_URL }}">
    {% endassets %}
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <nav class="mb-8 space-x-4 border-b border-gray-700 pb-4">
            <a href="/vault/add_page" class="text-gray-400 hover:text-white">Add</a>
            <a href="/vault/view_page" class="text-blue-400 font-bold">View</a>
            <a href="/vault/delete_page" class="text-gray-400 hover:text-white">Delete</a>
            <a href="/vault/audit_page" class="text-gray-400 hover:text-white">Audit</a>
            <a href="/vault/signout" class="text-red-400 hover:text-white">Sign Out</a>
        </nav>

        <table class="w-full text-left bg-gray-800 rounded-lg overflow-hidden">
            <thead class="bg-gray-700">
                <tr>
                    <th class="p-4">Service</th>
                    <th class="p-4">Username</th>
                    <th class="p-4">Password</th>
                </tr>
            </thead>
            <tbody id="vaultBody">
                <tr><td colspan="3" class="p-8 text-center text-gray-500">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        loadVault();
        async function loadVault() {
            const response = await fetch('/vault/view', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})
            });
            
            const result = await response.json();
            if (result.status === "success") {
                document.getElementById('vaultBody').innerHTML = result.data.map(row => `
                    <tr class="border-b border-gray-700">
                        <td class="p-4">${row[1]}</td> <td class="p-4">${row[2]}</td> <td class="p-4 font-mono text-green-400">${row[3]}</td> </tr>
                `).join('');
            } else {
                alert("Authorization failed.");
            }
        }
    </script>
</body>
</html>
